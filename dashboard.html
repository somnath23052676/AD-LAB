<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px;">

    <h1>Welcome {{ user }}</h1>

    <table border="1" style="margin:auto; padding:10px;">
        <tr>
            <th>Subject</th>
            <th>Grade</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/logout">Logout</a>

</body>
</html>
